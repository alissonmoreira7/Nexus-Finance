spring.application.name=NexusFinance
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/nexus_finance_db}
spring.datasource.username=${DB_USER:admin}
spring.datasource.password=${DB_PASSWORD:admin}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
app.auth.secret=${APP_AUTH_SECRET:change-this-development-secret-with-at-least-32-characters}
app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:5173}
